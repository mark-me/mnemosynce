[project]
site_name        = "Mnemosynce"
site_description = "A backup orchestrator for Linux home servers — user and developer documentation."
site_author      = "Mark Zwart"
copyright        = "Copyright &copy; 2026 Mark Zwart — MIT Licence"

nav = [
  { "Home" = "index.md" },
  { "User guide" = [
    { "Overview"          = "user/index.md" },
    { "Installation"      = "user/installation.md" },
    { "First-time setup"  = "user/setup-wizard.md" },
    { "Configuration"     = "user/configuration.md" },
    { "SSH keys"          = "user/ssh-keys.md" },
    { "Scheduling"        = "user/scheduling.md" },
    { "Monitoring"        = "user/monitoring.md" },
    { "Docker"            = "user/docker.md" },
    { "Restoring files"   = "user/restoring.md" },
  ]},
  { "Developer guide" = [
    { "Overview"          = "developer/index.md" },
    { "Architecture"      = "developer/architecture.md" },
    { "Setup"             = "developer/setup.md" },
    { "Backup engine"     = "developer/backup-engine.md" },
    { "Web application"   = "developer/web-app.md" },
    { "Setup wizard"      = "developer/setup-wizard.md" },
    { "Testing"           = "developer/testing.md" },
    { "Configuration ref" = "developer/config-reference.md" },
  ]},
]

[project.theme]
language = "en"
features = [
  "announce.dismiss",
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.footnote.tooltips",
  "content.tabs.link",
  "content.tooltips",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.path",
  "navigation.sections",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
]

[project.theme.icon]
logo = "lucide/hard-drive"

[project.theme.font]
text = "Inter"
code = "JetBrains Mono"

[[project.theme.palette]]
scheme      = "default"
primary     = "indigo"
accent      = "indigo"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme      = "slate"
primary     = "indigo"
accent      = "indigo"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index     = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums    = true
line_spans         = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style   = true
combine_header_slug = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]
